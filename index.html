
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tokyo 4-Day Map</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #000; color: #fff; font-family: Arial; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    h2 { margin: 20px 0 10px; }

    /* Hotel info bar — always visible */
    .hotel-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 16px;
      width: 90%;
      max-width: 900px;
    }
    .hotel-bar img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .hotel-bar .hotel-info { font-size: 13px; line-height: 1.5; }
    .hotel-bar .hotel-info strong { font-size: 14px; }

    /* Tabs */
    .tabs { display: flex; justify-content: center; margin-bottom: 16px; }
    .tab { padding: 10px 20px; background: #333; margin: 0 5px; cursor: pointer; border-radius: 5px; }
    .tab.active { background: #666; }

    /* Map container */
    .tab-content { display: none; width: 90%; max-width: 900px; }
    .tab-content.active { display: block; }

    .map-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }
    .map-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    /* Hotspots */
    .hotspot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
      opacity: 0.75;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s, transform 0.2s;
    }
    .hotspot:hover {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.3);
    }
  </style>
</head>
<body>
  <h2>Tokyo 4-Day Interactive Map</h2>

  <!-- Hotel info always visible at top -->
  <div class="hotel-bar">
    <img src="tokyo-hotel.jpg" alt="stayme THE HOTEL 上野駅前">
    <div class="hotel-info">
      <strong>stayme THE HOTEL 上野駅前</strong><br>
      7 Chome-10-13 Ueno, Taito City, Tokyo 110-0005, Japan<br>
      +81 3-6778-7790
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab(1)">Day 1</div>
    <div class="tab" onclick="showTab(2)">Day 2</div>
    <div class="tab" onclick="showTab(3)">Day 3</div>
    <div class="tab" onclick="showTab(4)">Day 4</div>
  </div>

  <!-- Day 1 -->
  <div id="tab1" class="tab-content active">
    <div class="map-wrapper">
      <img src="tokyo-map.jpg" alt="Tokyo Map">
      <div class="hotspot" style="left:35%; top:45%;" onclick="alert('Shibuya Crossing')"></div>
      <div class="hotspot" style="left:30%; top:35%;" onclick="alert('Harajuku / Meiji Shrine')"></div>
      <div class="hotspot" style="left:45%; top:25%;" onclick="alert('Shinjuku')"></div>
      <div class="hotspot" style="left:58%; top:42%;" onclick="alert('stayme THE HOTEL 上野駅前\n7 Chome-10-13 Ueno, Taito City, Tokyo 110-0005, Japan\n+81 3-6778-7790')"></div>
    </div>
  </div>

  <!-- Day 2 -->
  <div id="tab2" class="tab-content">
    <div class="map-wrapper">
      <img src="tokyo-map.jpg" alt="Tokyo Map">
      <div class="hotspot" style="left:55%; top:40%;" onclick="alert('Asakusa / Senso-ji')"></div>
      <div class="hotspot" style="left:60%; top:50%;" onclick="alert('Ueno Park')"></div>
      <div class="hotspot" style="left:65%; top:45%;" onclick="alert('Akihabara')"></div>
    </div>
  </div>

  <!-- Day 3 -->
  <div id="tab3" class="tab-content">
    <div class="map-wrapper">
      <img src="tokyo-map.jpg" alt="Tokyo Map">
      <div class="hotspot" style="left:40%; top:55%;" onclick="alert('Ginza')"></div>
      <div class="hotspot" style="left:50%; top:60%;" onclick="alert('Tokyo Station')"></div>
      <div class="hotspot" style="left:45%; top:65%;" onclick="alert('Imperial Palace')"></div>
    </div>
  </div>

  <!-- Day 4 -->
  <div id="tab4" class="tab-content">
    <div class="map-wrapper">
      <img src="tokyo-map.jpg" alt="Tokyo Map">
      <div class="hotspot" style="left:25%; top:75%;" onclick="alert('Odaiba / Rainbow Bridge')"></div>
      <div class="hotspot" style="left:35%; top:70%;" onclick="alert('TeamLab Borderless')"></div>
      <div class="hotspot" style="left:55%; top:30%;" onclick="alert('Roppongi')"></div>
    </div>
  </div>

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
      document.querySelectorAll('.tab')[n - 1].classList.add('active');
    }
  </script>
</body>
</html>
