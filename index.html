<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tokyo Map Hotspots</title>
  <style>
    body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .map-container { position:relative; display:inline-block; }
    img { max-width:100%; max-height:90vh; }
    .hotspot {
      position:absolute; width:20px; height:20px; background:red; border-radius:50%;
      opacity:0.7; cursor:pointer; transform:translate(-50%,-50%);
    }
    .hotspot:hover { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
  </style>
</head>
<body>
  <div class="map-container">
    <img src="tokyo-tourist-map-city-overview.jpg" alt="Tokyo Overview Map">
    
    <!-- Example hotspots - adjust coordinates % based on actual map -->
    <div class="hotspot" style="left:25%; top:40%;" onclick="alert('Shibuya Area')"></div>
    <div class="hotspot" style="left:45%; top:25%;" onclick="alert('Shinjuku')"></div>
    <div class="hotspot" style="left:60%; top:35%;" onclick="alert('Akihabara')"></div>
    <div class="hotspot" style="left:30%; top:60%;" onclick="alert('Ginza')"></div>
    <div class="hotspot" style="left:50%; top:70%;" onclick="alert('Tokyo Station')"></div>
  </div>
</body>
</html>
